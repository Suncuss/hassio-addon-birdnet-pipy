absolute_redirect off;
rewrite ^%%ingress_entry%%/(.*)$ /$1 break;
# Ensure backend sends uncompressed HTML so sub_filter can rewrite it.
# nginx will re-compress the response to the client via gzip_proxied.
proxy_set_header Accept-Encoding "";
sub_filter_once off;
# Only rewrite HTML responses — JS/JSON/binary are handled by the frontend
# or don't contain rewritable paths. This avoids scanning every response body.
sub_filter_types text/html;

# Inject <base href> for Vue Router history mode and static asset loading.
# The frontend reads this to derive API/stream/socket.io base URLs at runtime.
sub_filter '<head>' '<head><base href="%%ingress_entry%%/">';

# Rewrite absolute href/src attributes in HTML (e.g. favicon, stylesheet links)
sub_filter 'href="/' 'href="%%ingress_entry%%/';
sub_filter 'src="/' 'src="%%ingress_entry%%/';
